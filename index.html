```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convite Especial ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    max-width:500px;
    animation:aparecer 1s ease;
    z-index:10;
}

h1{
    color:#ff4d6d;
    margin-bottom:20px;
}

p{
    font-size:18px;
    margin-bottom:25px;
    color:#444;
    line-height:1.6;
}

.botoes{
    display:flex;
    justify-content:center;
    gap:15px;
}

button{
    border:none;
    padding:15px 25px;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
    transition:0.3s;
}

#sim{
    background:#ff4d6d;
    color:white;
}

#sim:hover{
    transform:scale(1.1);
}

#nao{
    background:#ddd;
}

.coracao{
    position:absolute;
    color:white;
    font-size:20px;
    animation:subir 6s linear infinite;
}

@keyframes subir{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:scale(0.8);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}
</style>
</head>

<body>

<div class="card">
    <h1>❤️ Convite Especial ❤️</h1>

    <p>
        Oi! 😊<br><br>
        Gostaria de te convidar para sair comigo.<br>
        Que tal passarmos um tempo juntos e nos conhecermos melhor?
    </p>

    <div class="botoes">
        <button id="sim">Sim 💖</button>
        <button id="nao">Não 😅</button>
    </div>
</div>

<script>

document.getElementById("sim").onclick = () =>{
    window.open(
        "https://wa.me/5511945217028?text=Oi%20Mauro!%20Aceito%20o%20seu%20convite%20❤️",
        "_blank"
    );
};

document.getElementById("nao").onmouseover = function(){
    this.style.position="absolute";
    this.style.left=Math.random()*80+"%";
    this.style.top=Math.random()*80+"%";
};

function criarCoracao(){
    const coracao=document.createElement("div");
    coracao.innerHTML="❤️";
    coracao.classList.add("coracao");

    coracao.style.left=Math.random()*100+"vw";
    coracao.style.fontSize=(Math.random()*20+15)+"px";

    document.body.appendChild(coracao);

    setTimeout(()=>{
        coracao.remove();
    },6000);
}

setInterval(criarCoracao,400);

</script>

</body>
</html>
```
